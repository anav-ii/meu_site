<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Virtual</title>
    <link rel="stylesheet" href="../css/styler_cadastro.css">
    
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
               MOTORCYCLES
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="pagina/cadastro.html">Cadastro</a></li>
                    <li><a href="pagina/sobre.html">Sobre</a></li>
                    <li><a href="pagina/login.html">Login</a></li>
                    <li><a href="pagina/carrinho.html"><img src="imagens/icones/carinhos.png" alt=""></a></li>
                </ul>
            </nav>
        </header>
        <div id="div-form">
            <h3>Cadastre Seus Dados Pessoais</h3>
            <form id="div-formulario">

                <label for="nome">Nome</label>
                <input type="text" id="nome" nome="nome" maxlength="15" required placeholder="Digite seu Nome">

                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" nome="sobrenome" maxlength="50" required placeholder="Digite seu Sobrenome">

                <label for="cpf">CPF</label>
                <input type="text" id="cpf" nome="cpf" maxlength="13" required placeholder="Digite seu CPF">

                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" nome="telefone" maxlength="15" required placeholder="Digite seu Telefone">

                <label for="email">Email</label>
                <input type="text" id="email" nome="email" maxlength="30" required placeholder="Digite seu email">

                <label for="datanascimento">Data Nascimento</label>
                <input type="date" id="data nascimento" nome="datanascimento" maxlength="8" required placeholder="Digite sua data nascimento">

                <label for="cep">CEP</label>
                <input type="number" id="cep" nome="cep" maxlength="11" required placeholder="Digite seu CEP">

                <label for="logradouro">Logradouro</label>
                <input type="text" id="logradouro" nome="logradouro" maxlength="60" required placeholder="Digite seu logradouro">

                <label for="numero">Número</label>
                <input type="number" id="numero" nome="numero" maxlength="15" required placeholder="Digite seu numero">

                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" nome="complemento" maxlength="60" required placeholder="Digite seu complemento">

                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" nome="bairro" maxlength="60" required placeholder="Digite seu bairro">

                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" nome="cidade" maxlength="15" required placeholder="Digite sua cidade">

                <label for="estado">Estado</label>
                <input type="text" id="estado" nome="estado" maxlength="20" required placeholder="Digite seu estado">

                <label for="senha">Senha</label>
                <input type="text" id="senha" nome="senha" maxlength="8" required placeholder="Digite sua senha">

                <button type="submit" id="btn-cadastrar">Cadastrar</button>
                <button type="reset" id="btn-limpar">Limpar</button>
            </form>
        </div>


        <footer id="rodape">
            <h2>&copy 20026  MOTORCYCLES S.A. Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartões de Débito e crédito</p>
        </footer>
    </main>
</body>
</html>
