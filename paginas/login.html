<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Virtual</title>
    <link rel="stylesheet" href="../css/styler_cadastro.css">
    
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html">
                    <img src="../imagens/logo_motorcycles.png" alt="Logo MOTORCYCLES">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="/paginas/cadastro.html">Cadastro</a></li>
                    <li><a href="/paginas/sobre.html">Sobre</a></li>
                    <li><a href="/paginas/login.html">Login</a></li>
                    <li><a href="/paginas/carrinho.html"><img src="../imagens/carrinho22.png" alt=""></a></li>
                </ul>
            </nav>
        </header>
        <div id="div-form">
            <h3>Login</h3>
            <form id="div-formulario">

                <label for="email">Email</label>
                <input type="text" id="email" nome="email" maxlength="20" required placeholder="Digite seu Email">

                <label for="senha">Senha</label>
                <input type="text" id="senha" nome="senha" maxlength="8" required placeholder="Digite sua senha">

                <button type="submit" id="btn-cadastrar">Enviar</button>
               
            </form>
        </div>


        <footer id="rodape">
            <h2>&copy 20026  MOTORCYCLES S.A. Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartões de Débito e crédito</p>
        </footer>
    </main>
</body>
</html>
